name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - run: cargo test --verbose --locked

  minimal-versions:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: nightly
    - run: cargo update -Z direct-minimal-versions
    - uses: dtolnay/rust-toolchain@stable
    - run: cargo test --verbose --locked

  miri:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: nightly
        components: miri
    - run: cargo miri test --verbose --locked

  fmt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: cargo clippy --verbose --locked --all-targets

  msrv:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - id: extract_msrv
      shell: python
      run: |
        import tomllib
        data = tomllib.load(open("Cargo.toml", "rb"))
        msrv = data["package"]["rust-version"]

        import os
        print(f"msrv={msrv}", file=open(os.environ["GITHUB_OUTPUT"], "a"))
    - uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ steps.extract_msrv.outputs.msrv }}
    - run: |
        rm Cargo.lock
        cargo update -p polling --precise 3.10.0
        cargo update -p async-lock --precise 3.4.1
        cargo update -p async-signal --precise 0.2.12
        cargo update -p async-process --precise 2.4.0
        cargo update -p async-fs --precise 2.1.3
        cargo update -p async-io --precise 2.5.0
      env:
        CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
    - run: cargo test --verbose --locked --lib --tests

  no-default-features:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: cargo build --verbose --locked --no-default-features

  stable-deref:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: cargo test --verbose --locked --features stable_deref

  doc:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: cargo doc --verbose --locked --no-deps --all-features
